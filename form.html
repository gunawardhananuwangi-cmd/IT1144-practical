<DOCTYPE html>
	<html long="en">
		<head>
			<title>Student Registration Form</title>
			<style>
				body{font-family:sans-serif; background-color:#b0cdf5; adding:40px; margin:0;}
				h1{color:#1a2020c; font-size:1.6rem; margin-bottom:24px;}
				button{background-color:#5da3d9;}
			</style>
		</head>
		<body>
			<h1>Student Registration Form</h1>
			<form>
				<lable>Full Name</lable><br>
				<input type="text" placeholder="Enter Your Full name"></input><br><br>

				<lable>Email</lable><br>
				<input type="email" placeholder="Enter your Email"></input><br><br>

				<lable>Password</lable><br>
				<input type="password" plceholder="XXXXXXXX"></input><br><br>

				<lable>Age</lable><br>
				<input type="number" placeholder="Your age"></input><br><br>

				<lable>Phone Number</lable><br>
				<input type="tel" placeholder="+94 770 000 000"></input><br><br>

				<p>Gender</p>
				<lable>
					<input type="Radio" name="Gender"></input>Male</lable><br>
					<input type="Radio" name="Gender"></input>Femail</lable><br>
				</lable><br>

				<p>Skill</p>
				<lable><input type="checkbox" name="skill">HTML</input></lable><br>
				<lable><input type="checkbox" name="Skill">CSS</input></lable><br>
				<lable><input type="checkbox" name="Skill">PHP</input></lable><br><br>

				<lable>Year of Student</lable>
				<select name="Year">
					<option>1st Year</option>
					<option>2nd Year</option>
					<option>3rd Year</option>
					<option>4th Year</option>
				</select><br><br>

				<lable>About You</lable><br>
				<textarea raws="4" placeholder="Tell about Your Self"></textarea><br><br>

				<button type="Submit">Submit</button>
			</form>
		</body>
	</html>
